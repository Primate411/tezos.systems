<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tezos Stats — tezos.systems</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#0A0E1A;--accent:#5B8DEF;--text:#D8E0F0;--glass:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08)}
  html,body{width:100%;height:100%;overflow:hidden}
  body{
    background:var(--bg);color:var(--text);
    font-family:system-ui,-apple-system,sans-serif;
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;transition:background 0.3s,color 0.3s;
  }
  .widget{
    width:100%;height:100%;padding:8px 12px;
    display:flex;flex-direction:column;justify-content:center;
    gap:3px;background:var(--glass);border:1px solid var(--border);
    border-radius:12px;position:relative;overflow:hidden;
  }
  .widget::before{
    content:'';position:absolute;inset:0;
    background:radial-gradient(ellipse at 50% 0%,rgba(255,255,255,0.03) 0%,transparent 70%);
    pointer-events:none;
  }
  .strip{
    display:flex;align-items:stretch;gap:8px;
    flex:1;
  }
  .stat-card{
    flex:1;background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.07);
    border-radius:8px;padding:8px 10px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:2px;min-width:0;
    transition:border-color 0.2s;
  }
  .stat-card:hover{border-color:var(--accent);border-opacity:0.3}
  .stat-val{
    font-family:'Courier New',monospace;
    font-size:clamp(14px,4vw,22px);
    font-weight:700;color:var(--accent);
    line-height:1;white-space:nowrap;
  }
  .stat-val.loading{opacity:0.3;animation:pulse 1.4s ease-in-out infinite}
  .stat-lbl{font-size:9px;opacity:0.45;letter-spacing:0.08em;text-transform:uppercase;text-align:center}
  .stat-sub{font-size:8px;opacity:0.3;text-align:center}
  .footer{position:absolute;bottom:4px;right:8px;font-size:8px;opacity:0.18;text-decoration:none;color:inherit;transition:opacity 0.2s}
  .footer:hover{opacity:0.5}
  .change-up{color:#22c55e}
  .change-dn{color:#ef4444}
  @keyframes pulse{0%,100%{opacity:0.3}50%{opacity:0.6}}
</style>
</head>
<body>
<div class="widget">
  <div class="strip" id="strip">
    <!-- dynamically filled -->
  </div>
  <a class="footer" href="https://tezos.systems" target="_blank" rel="noopener">tezos.systems</a>
</div>
<script>
(function(){
  const THEMES={
    matrix:{bg:'#0a0f0a',accent:'#00ff00',text:'#00ff41'},
    default:{bg:'#0A0E1A',accent:'#5B8DEF',text:'#D8E0F0'},
    void:{bg:'#06060C',accent:'#8B5CF6',text:'#D8D0FF'},
    ember:{bg:'#0D0806',accent:'#FF9F43',text:'#FFE8D6'},
    signal:{bg:'#060A08',accent:'#00E4A0',text:'#C8F0E0'},
    nerv:{bg:'#000000',accent:'#FF9830',text:'#F0D8B0'},
    clean:{bg:'#F8F9FC',accent:'#2563EB',text:'#1A1D26'},
    dark:{bg:'#161616',accent:'#D0D0D0',text:'#F0F0F0'},
    bubblegum:{bg:'#1F0E18',accent:'#FF69B4',text:'#F5E0EE'},
    abyss:{bg:'#020A1E',accent:'#00E5FF',text:'#A8D8FF'},
    moss:{bg:'#040C02',accent:'#50E850',text:'#D0E8B8'},
    warzone:{bg:'#080A02',accent:'#FFC000',text:'#E0D8A0'},
    light:{bg:'#F8F9FC',accent:'#2563EB',text:'#1A1D26'},
    transparent:{bg:'transparent',accent:'#ffffff',text:'#ffffff'}
  };
  THEMES['dark-theme']=THEMES.dark;

  const p=new URLSearchParams(location.search);
  const tn=p.get('theme')||'default';
  const accent=p.get('accent');
  const refresh=parseInt(p.get('refresh')||'60',10)*1000;
  const statsParam=p.get('stats')||'bakers,price,blocks';
  const stats=statsParam.split(',').map(s=>s.trim().toLowerCase()).slice(0,4);
  const t=THEMES[tn]||THEMES.default;
  const r=document.documentElement;
  r.style.setProperty('--bg',t.bg);
  r.style.setProperty('--accent',accent?'#'+accent.replace('#',''):t.accent);
  r.style.setProperty('--text',t.text);

  const strip=document.getElementById('strip');

  const STAT_META={
    bakers:{label:'Bakers',sub:'Active',icon:'🥐'},
    price:{label:'XTZ Price',sub:'USD',icon:'💰'},
    blocks:{label:'Block',sub:'Height',icon:'⛓️'},
    staking:{label:'Staked',sub:'% of Supply',icon:'🔒'},
    protocol:{label:'Protocol',sub:'Version',icon:'⚡'},
    cycle:{label:'Cycle',sub:'Current',icon:'🔄'}
  };

  // Create placeholder cards
  const cards={};
  stats.forEach(s=>{
    const meta=STAT_META[s]||{label:s,sub:'',icon:'•'};
    const div=document.createElement('div');
    div.className='stat-card';
    div.innerHTML=`
      <div class="stat-val loading" id="val-${esc(s)}">—</div>
      <div class="stat-lbl">${esc(meta.label)}</div>
      ${meta.sub?`<div class="stat-sub">${esc(meta.sub)}</div>`:''}
    `;
    strip.appendChild(div);
    cards[s]=document.getElementById('val-'+s);
  });

  function esc(s){return String(s).replace(/[&<>"']/g,c=>({&:'&amp;',<:'&lt;',>:'&gt;',"'":'&#39;','"':'&quot;'}[c]))}

  function setVal(key,val,classes=''){
    const el=cards[key];
    if(el){el.textContent=val;el.className='stat-val'+(classes?' '+classes:'');el.classList.remove('loading')}
  }

  async function fetchData(){
    const needs=new Set(stats);
    const fetches=[];

    if(needs.has('bakers')){
      fetches.push(
        fetch('https://api.tzkt.io/v1/delegates/count?active=true')
          .then(r=>r.json())
          .then(c=>setVal('bakers',parseInt(c).toLocaleString()))
          .catch(()=>setVal('bakers','—'))
      );
    }

    if(needs.has('price')){
      fetches.push(
        fetch('https://api.coingecko.com/api/v3/simple/price?ids=tezos&vs_currencies=usd&include_24hr_change=true')
          .then(r=>r.json())
          .then(d=>{
            const usd=d.tezos?.usd;
            const chg=d.tezos?.usd_24h_change;
            const cls=chg!=null?(chg>=0?'change-up':'change-dn'):'';
            setVal('price',usd?'$'+usd.toFixed(4):'—',cls);
          })
          .catch(()=>setVal('price','—'))
      );
    }

    if(needs.has('blocks')||needs.has('cycle')){
      fetches.push(
        fetch('https://api.tzkt.io/v1/head')
          .then(r=>r.json())
          .then(d=>{
            if(needs.has('blocks'))setVal('blocks',d.level?.toLocaleString()||'—');
            if(needs.has('cycle'))setVal('cycle',d.cycle?.toLocaleString()||'—');
          })
          .catch(()=>{
            if(needs.has('blocks'))setVal('blocks','—');
            if(needs.has('cycle'))setVal('cycle','—');
          })
      );
    }

    if(needs.has('staking')){
      fetches.push(
        fetch('https://api.tzkt.io/v1/statistics/current')
          .then(r=>r.json())
          .then(d=>{
            const staked=(d.totalOwnStaked||0)+(d.totalExternalStaked||0);
            const pct=d.totalSupply?(staked/d.totalSupply*100).toFixed(1):'—';
            setVal('staking',pct!=='—'?pct+'%':'—');
          })
          .catch(()=>setVal('staking','—'))
      );
    }

    if(needs.has('protocol')){
      fetches.push(
        fetch('https://api.tzkt.io/v1/protocols/current')
          .then(r=>r.json())
          .then(d=>setVal('protocol',d.extras?.alias||d.metadata?.alias||d.alias||d.hash?.slice(0,8)||'—'))
          .catch(()=>setVal('protocol','—'))
      );
    }

    await Promise.allSettled(fetches);
  }

  fetchData();
  setInterval(fetchData,refresh);
})();
</script>
</body>
</html>
