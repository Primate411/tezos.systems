<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tezos Stats — tezos.systems</title>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#0A0E1A;--accent:#5B8DEF;--text:#D8E0F0;--glass:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08)}
  html,body{width:100%;height:100%;overflow:hidden}
  body{
    background:var(--bg);color:var(--text);
    font-family:system-ui,-apple-system,sans-serif;
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;transition:background 0.3s,color 0.3s;
  }
  .widget{
    width:100%;height:100%;padding:8px 12px;
    display:flex;flex-direction:column;justify-content:center;
    gap:3px;background:var(--glass);border:1px solid var(--border);
    border-radius:12px;position:relative;overflow:hidden;
  }
  .widget::before{
    content:'';position:absolute;inset:0;
    background:radial-gradient(ellipse at 50% 0%,rgba(255,255,255,0.03) 0%,transparent 70%);
    pointer-events:none;
  }
  .strip{
    display:flex;align-items:stretch;gap:8px;
    flex:1;
  }
  .stat-card{
    flex:1;background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.07);
    border-radius:8px;padding:8px 10px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:2px;min-width:0;
    transition:border-color 0.2s;
  }
  .stat-card:hover{border-color:var(--accent);border-opacity:0.3}
  .stat-val{
    font-family:'Courier New',monospace;
    font-size:clamp(14px,4vw,22px);
    font-weight:700;color:var(--accent);
    line-height:1;white-space:nowrap;
  }
  .stat-val.loading{opacity:0.3;animation:pulse 1.4s ease-in-out infinite}
  .stat-lbl{font-size:9px;opacity:0.45;letter-spacing:0.08em;text-transform:uppercase;text-align:center}
  .stat-sub{font-size:8px;opacity:0.3;text-align:center}
  .footer{position:absolute;bottom:4px;right:8px;font-size:8px;opacity:0.18;text-decoration:none;color:inherit;transition:opacity 0.2s}
  .footer:hover{opacity:0.5}
  .change-up{color:#22c55e}
  .change-dn{color:#ef4444}
  @keyframes pulse{0%,100%{opacity:0.3}50%{opacity:0.6}}
</style>
</head>
<body>
<div class="widget">
  <div class="strip" id="strip">
    <!-- dynamically filled -->
  </div>
  <a class="footer" href="https://tezos.systems/?utm_source=tezos_systems&utm_medium=widget_attribution&utm_campaign=tezos_systems_widgets&utm_content=combo" target="_blank" rel="noopener">powered by tezos.systems -></a>
</div>
<script src="//gc.zgo.at/count.js" async></script>
<script src="../js/core/goatcounter-init.js"></script>
<script type="module">
import {
  applyWidgetTheme,
  COMBO_STAT_OPTIONS,
  escapeHtml,
  fetchWidgetJson,
  formatCount,
  formatHeadAge,
  formatPercent,
  normalizeComboStats,
  poweredBakers,
  protocolAlias,
  stakingRatioFromStats,
  startWidgetRefresh,
  summarizeTz4Power,
  WIDGET_ENDPOINTS
} from './runtime.js';

(function(){
  const settings=applyWidgetTheme();
  const stats=normalizeComboStats(settings.params.get('stats'));

  const strip=document.getElementById('strip');

  const STAT_META=Object.fromEntries(COMBO_STAT_OPTIONS.map((stat)=>[stat.key,stat]));

  // Create placeholder cards
  const cards={};
  stats.forEach(s=>{
    const meta=STAT_META[s]||{label:s,sub:'',icon:'•'};
    const div=document.createElement('div');
    div.className='stat-card';
    div.innerHTML=`
      <div class="stat-val loading" id="val-${escapeHtml(s)}">—</div>
      <div class="stat-lbl">${escapeHtml(meta.label)}</div>
      ${meta.sub?`<div class="stat-sub">${escapeHtml(meta.sub)}</div>`:''}
    `;
    strip.appendChild(div);
    cards[s]=document.getElementById('val-'+s);
  });

  function setVal(key,val,classes=''){
    const el=cards[key];
    if(el){el.textContent=val;el.className='stat-val'+(classes?' '+classes:'');el.classList.remove('loading')}
  }

  async function fetchData(){
    const needs=new Set(stats);
    const fetches=[];

    if(needs.has('bakers')){
      fetches.push(
        fetchWidgetJson(WIDGET_ENDPOINTS.activeBakers())
          .then(bakers=>{
            setVal('bakers',formatCount(poweredBakers(bakers).length));
            if(needs.has('tz4'))setVal('tz4',formatPercent(summarizeTz4Power(bakers),1));
          })
          .catch(()=>{
            setVal('bakers','—');
            if(needs.has('tz4'))setVal('tz4','—');
          })
      );
    } else if(needs.has('tz4')){
      fetches.push(
        fetchWidgetJson(WIDGET_ENDPOINTS.activeBakers())
          .then(bakers=>setVal('tz4',formatPercent(summarizeTz4Power(bakers),1)))
          .catch(()=>setVal('tz4','—'))
      );
    }

    if(needs.has('price')){
      fetches.push(
        fetchWidgetJson(WIDGET_ENDPOINTS.price())
          .then(d=>{
            const usd=d.tezos?.usd;
            const chg=d.tezos?.usd_24h_change;
            const cls=chg!=null?(chg>=0?'change-up':'change-dn'):'';
            setVal('price',usd?'$'+usd.toFixed(4):'—',cls);
          })
          .catch(()=>setVal('price','—'))
      );
    }

    if(needs.has('blocks')||needs.has('cycle')||needs.has('health')){
      fetches.push(
        fetchWidgetJson(WIDGET_ENDPOINTS.head())
          .then(d=>{
            if(needs.has('blocks'))setVal('blocks',d.level?.toLocaleString()||'—');
            if(needs.has('cycle'))setVal('cycle',d.cycle?.toLocaleString()||'—');
            if(needs.has('health'))setVal('health',formatHeadAge(d.timestamp));
          })
          .catch(()=>{
            if(needs.has('blocks'))setVal('blocks','—');
            if(needs.has('cycle'))setVal('cycle','—');
            if(needs.has('health'))setVal('health','—');
          })
      );
    }

    if(needs.has('staking')){
      fetches.push(
        fetchWidgetJson(WIDGET_ENDPOINTS.statistics())
          .then(stats=>{
            setVal('staking',formatPercent(stakingRatioFromStats(stats),1));
          })
          .catch(()=>setVal('staking','—'))
      );
    }

    if(needs.has('protocol')){
      fetches.push(
        fetchWidgetJson(WIDGET_ENDPOINTS.currentProtocol())
          .then(d=>setVal('protocol',protocolAlias(d)))
          .catch(()=>setVal('protocol','—'))
      );
    }

    await Promise.allSettled(fetches);
  }

  startWidgetRefresh(fetchData,settings.refreshMs);
})();
</script>
</body>
</html>
