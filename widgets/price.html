<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XTZ Price — tezos.systems</title>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#0A0E1A;--accent:#5B8DEF;--text:#D8E0F0;--glass:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08)}
  html,body{width:100%;height:100%;overflow:hidden}
  body{
    background:var(--bg);color:var(--text);
    font-family:system-ui,-apple-system,sans-serif;
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;transition:background 0.3s,color 0.3s;
  }
  .widget{
    width:100%;height:100%;padding:12px 16px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:5px;background:var(--glass);border:1px solid var(--border);
    border-radius:12px;position:relative;overflow:hidden;
  }
  .widget::before{
    content:'';position:absolute;inset:0;
    background:radial-gradient(ellipse at 50% 0%,rgba(255,255,255,0.03) 0%,transparent 70%);
    pointer-events:none;
  }
  .label{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;opacity:0.55;font-weight:500}
  .price-row{display:flex;align-items:baseline;gap:6px}
  .price{
    font-family:'Courier New',monospace;
    font-size:clamp(24px,7vw,44px);
    font-weight:700;color:var(--accent);line-height:1;
  }
  .price.loading{opacity:0.3;animation:pulse 1.4s ease-in-out infinite}
  .currency{font-size:0.45em;opacity:0.6;font-weight:400}
  .change{
    font-size:clamp(11px,3vw,15px);font-weight:600;
    padding:2px 7px;border-radius:6px;
    background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);
    font-family:'Courier New',monospace;
    transition:color 0.3s,background 0.3s;
  }
  .change.up{color:#22c55e;background:rgba(34,197,94,0.1);border-color:rgba(34,197,94,0.2)}
  .change.down{color:#ef4444;background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.2)}
  .sub{font-size:9px;opacity:0.35}
  .footer{position:absolute;bottom:5px;right:8px;font-size:9px;opacity:0.2;text-decoration:none;color:inherit;transition:opacity 0.2s}
  .footer:hover{opacity:0.5}
  .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);margin-right:4px;vertical-align:middle;animation:blink 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:0.3}50%{opacity:0.6}}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
</style>
</head>
<body>
<div class="widget">
  <div class="label"><span class="dot"></span>XTZ Price</div>
  <div class="price-row">
    <div class="price loading" id="price">—</div>
    <div class="change" id="change">—%</div>
  </div>
  <div class="sub" id="sub">24h change · CoinGecko</div>
  <a class="footer" href="https://tezos.systems/?utm_source=tezos_systems&utm_medium=widget_attribution&utm_campaign=tezos_systems_widgets&utm_content=price" target="_blank" rel="noopener">powered by tezos.systems -></a>
</div>
<script src="//gc.zgo.at/count.js" async></script>
<script src="../js/core/goatcounter-init.js"></script>
<script type="module">
import {
  applyWidgetTheme,
  fetchWidgetJson,
  startWidgetRefresh,
  WIDGET_ENDPOINTS
} from './runtime.js';

(function(){
  const settings=applyWidgetTheme();

  const priceEl=document.getElementById('price');
  const changeEl=document.getElementById('change');
  const subEl=document.getElementById('sub');

  async function fetchData(){
    try{
      const d=await fetchWidgetJson(WIDGET_ENDPOINTS.price());
      const xtz=d.tezos;
      if(xtz){
        const usd=xtz.usd;
        const chg=xtz.usd_24h_change;
        priceEl.textContent='$'+usd.toFixed(4);
        priceEl.classList.remove('loading');
        if(chg!=null){
          const sign=chg>=0?'+':'';
          changeEl.textContent=sign+chg.toFixed(2)+'%';
          changeEl.className='change '+(chg>=0?'up':'down');
        }
        subEl.textContent='24h change · CoinGecko · USD';
      }
    }catch(e){priceEl.textContent='—';changeEl.textContent='—%'}
  }

  startWidgetRefresh(fetchData,settings.refreshMs);
})();
</script>
</body>
</html>
