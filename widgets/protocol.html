<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protocol — tezos.systems</title>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#0A0E1A;--accent:#5B8DEF;--text:#D8E0F0;--glass:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08)}
  html,body{width:100%;height:100%;overflow:hidden}
  body{
    background:var(--bg);color:var(--text);
    font-family:system-ui,-apple-system,sans-serif;
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;transition:background 0.3s,color 0.3s;
  }
  .widget{
    width:100%;height:100%;padding:12px 16px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:5px;background:var(--glass);border:1px solid var(--border);
    border-radius:12px;position:relative;overflow:hidden;
  }
  .widget::before{
    content:'';position:absolute;inset:0;
    background:radial-gradient(ellipse at 50% 0%,rgba(255,255,255,0.03) 0%,transparent 70%);
    pointer-events:none;
  }
  .label{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;opacity:0.55;font-weight:500}
  .protocol{
    font-family:'Courier New',monospace;
    font-size:clamp(16px,5vw,28px);
    font-weight:700;color:var(--accent);line-height:1;
    letter-spacing:0.02em;max-width:100%;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .protocol.loading{opacity:0.3;animation:pulse 1.4s ease-in-out infinite}
  .stats-row{display:flex;gap:8px;align-items:center;margin-top:2px}
  .badge{
    background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
    border-radius:6px;padding:2px 7px;font-size:10px;
    display:flex;align-items:center;gap:4px;
  }
  .badge-accent{color:var(--accent);font-weight:600;font-family:'Courier New',monospace}
  .sub{font-size:9px;opacity:0.35}
  .footer{position:absolute;bottom:5px;right:8px;font-size:9px;opacity:0.2;text-decoration:none;color:inherit;transition:opacity 0.2s}
  .footer:hover{opacity:0.5}
  .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);margin-right:4px;vertical-align:middle;animation:blink 2s ease-in-out infinite}
  .upgrade-icon{font-size:11px}
  @keyframes pulse{0%,100%{opacity:0.3}50%{opacity:0.6}}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
</style>
</head>
<body>
<div class="widget">
  <div class="label"><span class="dot"></span>Protocol</div>
  <div class="protocol loading" id="proto">Loading…</div>
  <div class="stats-row">
    <div class="badge">
      <span class="upgrade-icon">⚡</span>
      <span class="badge-accent" id="upgrades">—</span>
      <span style="opacity:0.5;font-size:9px">upgrades</span>
    </div>
    <div class="badge">
      <span style="opacity:0.5;font-size:9px">v</span>
      <span class="badge-accent" id="version">—</span>
    </div>
  </div>
  <div class="sub">Self-amending · Zero hard forks</div>
  <a class="footer" href="https://tezos.systems" target="_blank" rel="noopener">tezos.systems</a>
</div>
<script type="module">
import {
  applyWidgetTheme,
  fetchWidgetJson,
  protocolAlias,
  startWidgetRefresh,
  WIDGET_ENDPOINTS
} from './runtime.js';

(function(){
  const settings=applyWidgetTheme();

  const protoEl=document.getElementById('proto');
  const upgradesEl=document.getElementById('upgrades');
  const versionEl=document.getElementById('version');

  async function fetchData(){
    try{
      const [proto,all]=await Promise.all([
        fetchWidgetJson(WIDGET_ENDPOINTS.currentProtocol()),
        fetchWidgetJson(WIDGET_ENDPOINTS.protocols())
      ]);
      if(proto){
        protoEl.textContent=protocolAlias(proto);
        protoEl.classList.remove('loading');
        upgradesEl.textContent=Array.isArray(all)?all.length:'—';
        versionEl.textContent=proto.code!=null?proto.code:'—';
      }
    }catch(e){protoEl.textContent='—';protoEl.classList.remove('loading')}
  }

  startWidgetRefresh(fetchData,settings.refreshMs);
})();
</script>
</body>
</html>
